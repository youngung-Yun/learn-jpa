spring:
  datasource:
    username: sa
    password:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      # schema.sql이 스키마를 생성하고 Hibernate는 엔티티 매핑 일치 여부만 확인한다.
      # Flyway 도입 후에도 validate를 유지하고 V1__init.sql 실행만 비활성화한다.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      # 인메모리 H2를 사용할 때 V1__init.sql 다음에 data.sql을 실행한다.
      # 테스트에서는 src/test/resources/application.yaml에서 비활성화한다.
      mode: never

logging:
  level:
    org.hibernate.SQL: TRACE
    org.hibernate.jdbc.bind: TRACE
